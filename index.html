<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Суета на 6 сотках</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <div class="app-shell">

        <div id="loader" class="loader">
            <div class="loader-sky">

                <div id="pawTrack" class="paw-track"></div>

                <div class="creator-sign">
                    created by iBerezovski
                </div>

                <img
                    id="loaderLogo"
                    class="loader-logo"
                    src="assets/loader-logo.png"
                    alt="Суета на 6 сотках">

                <div class="loader-text">Загрузка...</div>

                <button id="startBtn" class="start-btn" type="button">
                    Играть
                </button>

            </div>
        </div>

        <main id="onboarding" class="screen onboarding hidden">

            <img
                id="onboardingImage"
                class="onboarding-image"
                src="assets/onb1.jpg"
                alt="Онбординг">

            <div class="onboarding-actions">

                <button
                    id="onboardingNextBtn"
                    class="onboarding-next-btn"
                    type="button">
                    Далее
                </button>

                <button
                    id="onboardingSkipBtn"
                    class="onboarding-skip-btn"
                    type="button">
                    Пропустить
                </button>

            </div>

        </main>

        <main id="game" class="screen game hidden">

            <header class="hud">
                <button id="backBtn" class="back-btn" type="button">‹</button>

                <div class="resource-row">
                    <div class="resource">🍎 <span id="apples">0</span></div>
                    <div class="resource">🫐 <span id="berries">0</span></div>
                    <div class="resource">🎃 <span id="pumpkins">0</span></div>
                </div>
            </header>

            <section class="farm">

                <div class="house-zone">
                    <img id="houseImg" class="house-img" src="assets/dom1.png" alt="Дом">

                    <div class="house-label">
                        <span id="houseName">Шалаш</span><br>
                        <span id="houseLevel">1</span> уровень
                    </div>

                    <div class="house-next">
                        До улучшения:
                        <span id="nextUpgrade">1000</span>
                    </div>
                </div>

                <button id="crow" class="crow" type="button">
                    <img id="crowImg" src="assets/crow.png" alt="Ворона">
                </button>

                <img
                    id="granny"
                    class="granny-img"
                    src="assets/granny.png"
                    alt="Бабушка">

                <img
                    id="hitSwipe"
                    class="hit-swipe"
                    src="assets/hit-swipe.png"
                    alt="">

                <div id="levelUpOverlay" class="level-up-overlay hidden">
                    <div class="level-up-glow"></div>

                    <img
                        id="grannyDance"
                        class="granny-dance"
                        src="assets/granny-dance.png"
                        alt="Бабушка танцует">

                    <div id="levelUpText" class="level-up-text">
                        Дом вырос!
                    </div>
                </div>

                <div id="newspaperDelivery" class="newspaper-delivery hidden">
                    <img
                        id="newspaperCrow"
                        class="newspaper-crow"
                        src="assets/crow.png"
                        alt="Ворона с письмом">

                    <div id="newspaperLetter" class="newspaper-letter">
                        ✉️
                    </div>
                </div>

                <div id="newspaperModal" class="newspaper-modal hidden">
                    <div class="newspaper-card">
                        <div class="newspaper-title">📰 Дачный Вестник</div>

                        <div
                            id="newspaperText"
                            class="newspaper-text">
                            Бабушка отбила очередную атаку вороны. Эксперты шокированы.
                        </div>

                        <button
                            id="newspaperCloseBtn"
                            class="newspaper-close-btn"
                            type="button">
                            Понятно
                        </button>
                    </div>
                </div>

                <button id="prizesBtn" class="prizes-btn" type="button">
                    🎁
                    <span>Призы</span>
                </button>

                <div id="effects" class="effects"></div>

            </section>

        </main>

        <main id="prizesScreen" class="screen prizes-screen hidden">

            <button
                id="prizesBackBtn"
                class="back-btn prizes-back"
                type="button">
                ‹
            </button>

            <div class="prizes-content">

                <h1>
                    А призы под елочкой<br>
                    на Новый год... 🫵🏻😎
                </h1>

                <video
                    class="mem-video"
                    autoplay
                    muted
                    loop
                    playsinline>

                    <source
                        src="assets/mem.webm"
                        type="video/webm">
                </video>

                <p class="prizes-bottom-text">
                    или нет?
                </p>

            </div>

        </main>

    </div>

    <script src="script.js?v=1.1"></script>

</body>
</html>
